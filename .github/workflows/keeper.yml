name: ArcVault Keeper

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compound:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ARC_RPC: https://rpc.testnet.arc.network
      PRIVATE_KEY: ${{ secrets.KEEPER_PRIVATE_KEY || secrets.PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate keeper secret
        shell: bash
        run: |
          if [ -z "$PRIVATE_KEY" ]; then
            echo "::error title=Missing keeper secret::Add KEEPER_PRIVATE_KEY in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Install keeper dependencies
        working-directory: scripts
        run: npm ci

      - name: Run keeper cycle
        working-directory: scripts
        run: node keeper.js
