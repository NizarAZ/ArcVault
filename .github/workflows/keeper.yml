name: ArcVault Keeper

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keeper
  cancel-in-progress: false

jobs:
  compound:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ARCRPC: ${{ vars.ARCRPC || 'https://rpc.testnet.arc.network' }}
      ARCRPC_FALLBACK: ${{ vars.ARCRPC_FALLBACK }}
      PRIVATE_KEY: ${{ secrets.KEEPER_PRIVATE_KEY || secrets.PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate keeper secret
        shell: bash
        run: |
          if [ -z "$PRIVATE_KEY" ]; then
            echo "::error title=Missing keeper secret::Add KEEPER_PRIVATE_KEY in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Install keeper dependencies
        working-directory: scripts
        run: npm ci --omit=dev

      - name: Run keeper cycle
        working-directory: scripts
        run: node keeper.js
